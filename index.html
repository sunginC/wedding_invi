<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=0"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="<%= GROOM_FIRSTNAME %> <%= BRIDE_FIRSTNAME %> 결혼합니다❤️"
    />
    <meta property="og:image" content="/preview_image.png" />
    <meta property="og:url" content="%BASE_URL%/" />
    <meta property="og:description" content="<%= DESCRIPTION %>" />
    <link rel="preload" href="/MapoGoldenPierA.woff" as="font" crossorigin />
    <link rel="preload" href="/AlluraRegular.woff" as="font" crossorigin />
    <link rel="preload" href="/daraehand.woff" as="font" crossorigin />
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
    <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=8716403b82dbcdb30a93de4569477bd2&autoload=true"></script>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/font.css" />
    <title><%= GROOM_FIRSTNAME %> <%= BRIDE_FIRSTNAME
       %> 결혼합니다❤️</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
          (function () {
            const KEY = "invite_toggle";
            const MOVE_URL = "https://sunginc.github.io/wedding_card/";
            
            // 쿠키 읽기 함수
            function getCookie(name) {
              const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
              if (match) return match[2];
              return null;
            }

            // 쿠키 쓰기 함수 
            function setCookie(name, value, days = 7) {
              const d = new Date();
              d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
              document.cookie = `${name}=${value}; path=/; expires=${d.toUTCString()}; SameSite=Lax`;
            }

            // 이전 인덱스 가져오기
            let index = parseInt(getCookie(KEY) || "-1", 10);
            if (isNaN(index)) {
              index = 0;
            }
            if (index === -1) {
              index = 0;
            } else {
              // 이후 방문이면 순차적으로 다음 이미지
              index = (index + 1)
            }

            // 쿠키에 저장
            setCookie(KEY, index.toString());
            if (index % 2 === 0) {
              index = (index + 1)
              location.replace(MOVE_URL);
            }

          })();
      </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
