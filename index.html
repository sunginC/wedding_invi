<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
     <script>
      (function () {
        const KEY = "invite_toggle"
        const MOVE_URL = "https://sunginc.github.io/wedding_card/"

        let v = localStorage.getItem(KEY)

        if (v === "stay") {
          v = "move"
        } else {
          v = "stay"
        }

        localStorage.setItem(KEY, v)

        if (v === "move") {
          location.replace(MOVE_URL)
        }
      })()
     </script>
